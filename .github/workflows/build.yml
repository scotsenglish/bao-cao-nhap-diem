name: Build dashboard from Excel data

on:
  push:
    paths:
      - "data/latest.xlsx"
      - "template.html"
      - "build.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build index.html from data/latest.xlsx
        run: python build.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "Khong co thay doi, bo qua commit." || git commit -m "Auto-build dashboard from data/latest.xlsx [skip ci]"
          git push
